# Ground truth for the anomaly report eval (`rake ai:eval`).
#
# Labels reflect what an IDEAL report should say given full knowledge of what
# actually happened — not what the historical model said. Evidence sources:
# stored nightly analyses (103 reports, 3/17–6/11/2026), operator replies,
# error_events first-seen dates, rapid-duplicate checks against ahoy_messages
# (<120s same-user confirmation pairs), weekly metrics, and incident-fix
# commits/issues. Mined 2026-06-11.
#
# Per week:
#   expected_status: healthy | warning | problem  (what an ideal report concludes)
#   must_flag:       real issues the report MUST surface (graded by LLM judge)
#   must_not_flag:   noise the report must NOT raise as a finding/warning
#   notes:           evidence and context for humans editing this file
#
# Update when a new real incident happens or a new noise pattern is identified.

# --- Legacy regression weeks (pre-window, kept for true-positive coverage) ---

24w06:
  expected_status: problem
  notes: "16 orders, 0 items, half emails — broken order creation bug"
  must_flag:
    - "orders being created with zero items (broken order creation)"

25w17:
  expected_status: warning
  notes: "Email double-sends began — 973 menu emails and 938 reminders vs normal ~500"
  must_flag:
    - "menu/reminder emails double-sending (roughly 2x normal volume)"

25w19:
  expected_status: warning
  notes: "Email double-sends worst week — 1,210 menu emails and 1,319 reminders (2.5x normal)"
  must_flag:
    - "menu/reminder emails double-sending (roughly 2.5x normal volume)"

25w20:
  expected_status: healthy
  notes: "Normal week after email bug resolved, 46 orders. KNOWN-HARD: comparison weeks are the inflated double-send weeks, so the ~514 sends look like a list collapse unless the model reasons that the prior volume was the bug."

