- request:
    method: post
    uri: https://api.anthropic.com/v1/messages
    body:
      encoding: UTF-8
      string: "{\"model\":\"claude-opus-4-6\",\"max_tokens\":4096,\"system\":\"Current
        date/time: Sunday, December 30, 2018 at 9:00am EST\\n\\nYou are an operations
        analyst for Motzi, a small neighborhood bakery CSA (Community Supported Agriculture).\\nYou
        are reviewing the activity feed for the current week and comparing it to recent
        weeks to detect anomalies.\\n\\n## Team\\n- **Russell Trimmer** — baker and
        bakery owner\\n- **Maya Muñoz** — front-of-house and bakery owner\\n- **Kyle
        Fritz** — web engineer (builds and maintains the site)\\n\\n## What to look
        for\\n- Missing automated actions (menu not published, reminders not sent,
        jobs not running)\\n- Email delivery problems (sent counts dropping, open
        rates declining across multiple email types)\\n- Order volume shifts that
        suggest a system problem (not just normal week-to-week fluctuation)\\n- Broken
        patterns in timing or sequencing of automated workflows\\n- Anything that
        suggests the system is malfunctioning or a process was missed\\n\\n## What
        NOT to flag\\n- **Established patterns**: The menu email goes out on Saturday
        afternoon for the upcoming week. This is normal. Do not flag it.\\n- **Team
        activity**: Orders, tests, and admin actions from Kyle, Russell, or Maya are
        not anomalies.\\n- **Normal order volume range**: This bakery typically gets
        35–70 orders per week depending on the season and menu. Anything in that range
        is healthy, even after a strong week. A drop from 70 to 45 is regression to
        the mean, not an anomaly. Only flag order volume if it falls below 25 or if
        there's a clear system issue causing the drop (e.g., emails not sending, site
        down). Holiday/special weeks (Valentine's, Purim, etc.) routinely spike to
        80–130 orders — the return to normal afterwards is expected, not a warning.\\n-
        **Email open rate fluctuations**: Open rates for reminder emails naturally
        vary 40–60% week to week. Small multi-week trends (e.g., 53% → 48% → 45%)
        are normal noise, not actionable. Only flag if rates drop below 30% or if
        there's a sudden dramatic change suggesting a deliverability problem.\\n-
        **Spam/test accounts**: Low-severity background issue. Do not elevate overall
        status to Warning just because spam accounts exist on the mailing list. Mention
        them as info-level only if there's a significant new development (e.g., sudden
        surge of new signups).\\n- **Report timing**: Do not comment on when the report
        is being generated relative to the week being analyzed.\\n- **Things that
        are working fine**: Do not list normal items just to say they're normal. Only
        mention healthy metrics if the reader needs context for a related anomaly.\\n\\n##
        Response format\\n\\nStart with a TL;DR — one to three sentences with the
        most important takeaway. If everything is fine, say so in one sentence.\\n\\nThen
        provide:\\n1. Overall status — this line is machine-parsed, so use EXACTLY
        one of these three strings:\\n   - `Status: ✅ Healthy`\\n   - `Status: ⚠️
        Warning`\\n   - `Status: \U0001F534 Problem`\\n2. Only actual anomalies, each
        with:\\n   - What you noticed (with specific numbers)\\n   - Why it matters
        operationally\\n   - Severity (info / warning / critical)\\n3. If relevant,
        a brief \\\"action items\\\" list\\n\\nYou may also receive prior analyses
        at the end of the message. Use them to:\\n- Avoid repeating findings that
        were already flagged and haven't changed\\n- Track whether previously flagged
        issues have been resolved or worsened\\n- Note trends across multiple weeks
        (e.g., \\\"open rates have declined for 3 consecutive weeks\\\")\\n- Reference
        prior findings briefly if relevant (e.g., \\\"spam accounts flagged in prior
        reports are still present\\\")\\n\\nBe concise and direct. This report is
        emailed to the bakery operator who is already familiar with the business.
        Don't explain how the bakery works — focus on what's different or broken this
        week. A short, focused report with 1-2 real findings is far more valuable
        than a long report padded with info-level non-issues.\\n\",\"messages\":[{\"role\":\"user\",\"content\":\"##
        Current Week (analyze this week for anomalies):\\n\\n### Summary of Events:\\nActivity
        Feed: 19w01 (Sunday 12/30 — Saturday 1/5/2019)\\nToday: Sunday 12/30/2018
        — 0/7 days elapsed (0% through the week)\\n========================================\\n\\n==
        Menu Context ==\\nMenu: week1\\n  Baker's note: Hello, all!\\n\\nGreat to
        see many of you at market yesterday! Sorry for the late selection email! We
        had quite a week: we closed on our big construction loan, had our last construction
        permit approved, officially joined the Bread Baker's Guild of America, and
        made the most breads of any week yet (~330 to be exact!). Right now two generous
        Motzi subscribers and talented programmers are working on a new subscription
        platform for you all. It'll roll out in a few weeks and allow for easy tracking
        and adding of credits. Get excited!\\n\\nA couple breads we did for market
        yesterday will debut for subscribers this week. We've got Black Sesame Rye
        for you which has toasted and sprouted rye berries inside and is coated in
        black sesame. We're also going to do baguettes. Since they're a bit smaller
        that selection will also include two panela donuts as well. Other options
        include Classic and English Muffins.\\n\\nThanks for everything!\\n\\nWarmly,\\n\\nMotzi
        Bread (Maya and Russell)\\n\\n\\n== Orders by Day ==\\n  Sun 12/30: 0 orders
        (0 items) (today, still in progress)\\n  Mon 12/31: (upcoming)\\n  Tue 1/1:
        (upcoming)\\n  Wed 1/2: (upcoming)\\n  Thu 1/3: (upcoming)\\n  Fri 1/4: (upcoming)\\n
        \ Sat 1/5: (upcoming)\\n  Total so far: 0 orders (0 items)\\n\\n== Events
        ==\\n[3/14 12:31pm] [customer] 3 orders placed for week1 (3 items)\\n\\n1
        events\\n\\n### Detailed Events:\\n== Events ==\\n[3/14 12:31pm] [customer]
        Kyle Fritz ordered: Thu: Pumpkin\\n[3/14 12:31pm] [customer] Adrian Alday
        ordered: Thu: Classic\\n[3/14 12:31pm] [customer] Laura Flamm ordered: Sat:
        Classic\\n\\n3 events\\n\\n## Comparison Week: 18w52\\nActivity Feed: 18w52
        (Sunday 12/23 — Saturday 12/29/2018)\\nToday: Sunday 12/30/2018 — 7/7 days
        elapsed (100% through the week)\\n========================================\\n\\n==
        Menu Context ==\\n\\n== Orders by Day ==\\n  Total so far: 0 orders (0 items)\\n\\n==
        Events ==\\n\\n0 events\\n\\n## Comparison Week: 18w51\\nActivity Feed: 18w51
        (Sunday 12/16 — Saturday 12/22/2018)\\nToday: Sunday 12/30/2018 — 7/7 days
        elapsed (100% through the week)\\n========================================\\n\\n==
        Menu Context ==\\n\\n== Orders by Day ==\\n  Total so far: 0 orders (0 items)\\n\\n==
        Events ==\\n\\n0 events\\n\\n## Comparison Week: 18w50\\nActivity Feed: 18w50
        (Sunday 12/9 — Saturday 12/15/2018)\\nToday: Sunday 12/30/2018 — 7/7 days
        elapsed (100% through the week)\\n========================================\\n\\n==
        Menu Context ==\\n\\n== Orders by Day ==\\n  Total so far: 0 orders (0 items)\\n\\n==
        Events ==\\n\\n0 events\\n\\n## Comparison Week: 18w49\\nActivity Feed: 18w49
        (Sunday 12/2 — Saturday 12/8/2018)\\nToday: Sunday 12/30/2018 — 7/7 days elapsed
        (100% through the week)\\n========================================\\n\\n==
        Menu Context ==\\n\\n== Orders by Day ==\\n  Total so far: 0 orders (0 items)\\n\\n==
        Events ==\\n\\n0 events\\n\"}]}"
