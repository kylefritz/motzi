production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(finished_before: 16.days.ago, sleep_between_batches: 0.3)"
    schedule: at 4:15am every day

  send_day_of_reminder:
    class: SendDayOfReminderJob
    schedule: "5 * * * *"

  send_havent_ordered_reminder:
    class: SendHaventOrderedReminderJob
    schedule: "15 * * * *"

  trim_analytics:
    class: TrimAnalyticsJob
    schedule: "30 4 * * *"

  analyze_anomalies:
    class: AnalyzeAnomaliesJob
    schedule: "10 21 * * * America/New_York"

  capture_dyno_metrics:
    class: CaptureDynoMetricsJob
    schedule: "3,33 * * * *"

  capture_db_backup:
    class: CaptureDbBackupJob
    schedule: every Sunday at 3am America/New_York
