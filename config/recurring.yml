production:
  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

  send_day_of_reminder:
    class: SendDayOfReminderJob
    schedule: every hour

  send_havent_ordered_reminder:
    class: SendHaventOrderedReminderJob
    schedule: every hour

  trim_analytics:
    class: TrimAnalyticsJob
    schedule: at 4am every day

  analyze_anomalies:
    class: AnalyzeAnomaliesJob
    schedule: every day at 9pm America/New_York

  capture_db_backup:
    class: CaptureDbBackupJob
    schedule: every Sunday at 3am America/New_York
