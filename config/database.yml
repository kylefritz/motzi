default: &default
  adapter: postgresql
  encoding: unicode
  # For details on connection pooling, see Rails configuration guide
  # https://guides.rubyonrails.org/configuring.html#database-pooling
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: motzi
  host: localhost

test:
  <<: *default
  # TEST_DATABASE lets each git worktree run tests against its own database —
  # concurrent suites sharing motzi_test clobber each other's fixtures.
  database: <%= ENV.fetch("TEST_DATABASE", "motzi_test") %>
  host: localhost

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>
